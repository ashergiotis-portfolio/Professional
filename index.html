<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asher GiOtis | Portfolio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .selection-blue::selection { background-color: #dbeafe; color: #1e3a8a; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UI Components ---

        const Badge = ({ children, color = "blue" }) => {
            const colors = {
                blue: "bg-blue-100 text-blue-800 border-blue-200",
                green: "bg-green-100 text-green-800 border-green-200",
                purple: "bg-purple-100 text-purple-800 border-purple-200",
                gray: "bg-gray-100 text-gray-800 border-gray-200",
            };
            return (
                <span className={`px-3 py-1 rounded-full text-[10px] font-bold border ${colors[color]} mr-2 mb-2 inline-block uppercase tracking-widest`}>
                    {children}
                </span>
            );
        };

        const SkillBar = ({ skill, level }) => (
            <div className="mb-6">
                <div className="flex justify-between mb-2">
                    <span className="text-sm font-semibold text-slate-200">{skill}</span>
                    <span className="text-sm text-slate-400">{level}%</span>
                </div>
                <div className="w-full bg-slate-700 rounded-full h-1.5">
                    <div className="bg-blue-500 h-1.5 rounded-full" style={{ width: `${level}%` }}></div>
                </div>
            </div>
        );

        const IconWrapper = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Main App ---

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('all');

            const personalInfo = {
                name: "Asher GiOtis",
                intro: "I specialize in bridging the gap for distributed teams. I don't just explain how software works; I design information systems that enable remote users to thrive. From virtual training webinars to async engineering collaboration, I ensure complex systems are adopted seamlessly across time zones.",
                socials: {
                    medium: "https://medium.com/dudeletmejam",
                    email: "mailto:asher.giotis@gmail.com", 
                    linkedin: "https://www.linkedin.com/in/asher-giotis-813b1481"
                }
            };

            const projects = [
                {
                    id: 1,
                    category: 'ux',
                    title: "The Art of Unambiguous Language",
                    role: "Technical UX",
                    icon: "pen-tool",
                    description: "Implemented a concise technical UX framework to eliminate ambiguity in user interfaces. Critical for async-first environments where users must self-serve without immediate support.",
                    metrics: [
                        "Delivered 40% efficiency gains in user workflows",
                        "Enabled 24/7 self-service for global teams",
                        "Zero proprietary screenshots required"
                    ],
                    tags: ["Technical UX", "Remote Enablement", "Async Workflows", "Conciseness"]
                },
                {
                    id: 2,
                    category: 'systems',
                    title: "Change Fatigue & Virtual Onboarding",
                    role: "Content Architect",
                    icon: "video",
                    description: "Designed a strategic content architecture to combat 'Change Fatigue' during complex system rollouts. Complemented documentation with interactive virtual training sessions.",
                    metrics: [
                        "Conducted 20+ virtual training workshops",
                        "Reduced user anxiety during remote rollout",
                        "Created video-first onboarding modules"
                    ],
                    tags: ["Virtual Training", "Change Management", "Video Guides", "Webinars"]
                },
                {
                    id: 3,
                    category: 'compliance',
                    title: "Documentation as Risk Mitigation",
                    role: "Compliance Lead",
                    icon: "shield-check",
                    description: "Redefined the role of technical writing as the primary line of defense for compliance. Managed compliance reviews entirely asynchronously across three time zones.",
                    metrics: [
                        "Identified content as primary risk vector",
                        "Streamlined remote compliance review workflows",
                        "Established 'Writer as Compliance Officer' model"
                    ],
                    tags: ["Risk Mitigation", "Remote Operations", "Async Governance"]
                },
                {
                    id: 4,
                    category: 'technical',
                    title: "Driving 99% CSAT via Documentation",
                    role: "Ops Specialist",
                    icon: "database",
                    description: "Shifted documentation from a reactive support tool to a proactive driver. Empowered remote support agents with instant access to accurate knowledge bases.",
                    metrics: [
                        "Achieved 99% CSAT Score",
                        "Reduced ramp-up time for remote agents",
                        "Proactive mitigation of legal liability"
                    ],
                    tags: ["Remote support", "Knowledge base", "Profitability"]
                }
            ];

            const filteredProjects = activeTab === 'all' 
                ? projects 
                : projects.filter(p => p.category === activeTab);

            return (
                <div className="min-h-screen">
                    {/* Nav */}
                    <nav className="fixed w-full bg-white/95 backdrop-blur-sm z-50 border-b border-slate-200 h-20 flex items-center">
                        <div className="max-w-7xl mx-auto px-6 md:px-12 w-full flex justify-between items-center">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-blue-600 rounded flex items-center justify-center text-white font-black text-xl">A</div>
                                <span className="font-bold text-xl tracking-tight">{personalInfo.name}</span>
                            </div>
                            <div className="hidden md:flex space-x-8">
                                <a href="#about" className="text-xs font-bold uppercase tracking-widest text-slate-600 hover:text-blue-600">About</a>
                                <a href="#expertise" className="text-xs font-bold uppercase tracking-widest text-slate-600 hover:text-blue-600">Expertise</a>
                                <a href="#projects" className="text-xs font-bold uppercase tracking-widest text-slate-600 hover:text-blue-600">Work</a>
                                <a href="#process" className="text-xs font-bold uppercase tracking-widest text-slate-600 hover:text-blue-600">Process</a>
                            </div>
                            <div className="hidden md:block">
                                <a href={personalInfo.socials.email} className="px-6 py-3 bg-slate-900 text-white text-xs font-bold uppercase tracking-widest rounded hover:bg-blue-600 transition-colors">Get in Touch</a>
                            </div>
                            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden">
                                <IconWrapper name={isMenuOpen ? "x" : "menu"} />
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section id="about" className="pt-48 pb-24 px-6 md:px-12 lg:px-24 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-wrap gap-2 mb-8">
                                <Badge color="blue">Remote Enablement</Badge>
                                <Badge color="purple">Tech PM</Badge>
                                <Badge color="green">Ops Specialist</Badge>
                            </div>
                            <h1 className="text-5xl md:text-7xl font-black text-slate-900 leading-tight mb-8">
                                Translating complexity<br />
                                into <span className="text-blue-600 italic">clarity</span> for<br />
                                distributed teams.
                            </h1>
                            <p className="text-xl text-slate-600 mb-10 leading-relaxed font-medium max-w-4xl">
                                {personalInfo.intro}
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4">
                                <a href="#projects" className="px-10 py-4 bg-blue-600 text-white font-bold uppercase tracking-widest rounded hover:bg-blue-700 shadow-lg shadow-blue-200 flex items-center justify-center transition-transform hover:-translate-y-1">
                                    View Portfolio <IconWrapper name="arrow-right" className="ml-3 w-5 h-5" />
                                </a>
                                <a href={personalInfo.socials.email} className="px-10 py-4 bg-white border-2 border-slate-200 text-slate-700 font-bold uppercase tracking-widest rounded hover:bg-slate-50 flex items-center justify-center">
                                    Contact Me
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Expertise */}
                    <section id="expertise" className="py-24 px-6 md:px-12 lg:px-24 bg-slate-50 border-y border-slate-200">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-16">
                                <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tight">Core Competencies</h2>
                                <div className="w-20 h-1.5 bg-blue-600 mt-2"></div>
                            </div>
                            <div className="grid md:grid-cols-3 gap-10">
                                <div className="bg-white p-10 rounded-xl border border-slate-200">
                                    <IconWrapper name="pen-tool" className="w-10 h-10 text-blue-600 mb-8" />
                                    <h3 className="text-2xl font-bold mb-4">UX & Technical Writing</h3>
                                    <p className="text-slate-600 mb-8 text-sm leading-relaxed">I create content that guides users and developers alike. From API references to microcopy, I ensure language is consistent, inclusive, and precise.</p>
                                    <ul className="space-y-3 font-semibold text-slate-800 text-sm">
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-blue-500 mr-3" /> User Manuals & SOPs</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-blue-500 mr-3" /> API Documentation</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-blue-500 mr-3" /> Microcopy & Content Strategy</li>
                                    </ul>
                                </div>
                                <div className="bg-white p-10 rounded-xl border border-slate-200">
                                    <IconWrapper name="globe" className="w-10 h-10 text-purple-600 mb-8" />
                                    <h3 className="text-2xl font-bold mb-4">Remote Collaboration & Training</h3>
                                    <p className="text-slate-600 mb-8 text-sm leading-relaxed">I thrive in distributed environments. I facilitate virtual trainings and establish async workflows that keep engineering and product teams aligned.</p>
                                    <ul className="space-y-3 font-semibold text-slate-800 text-sm">
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-purple-500 mr-3" /> Virtual Webinars & Workshops</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-purple-500 mr-3" /> Async Workflows (Slack/Loom)</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-purple-500 mr-3" /> LMS Course Creation</li>
                                    </ul>
                                </div>
                                <div className="bg-white p-10 rounded-xl border border-slate-200">
                                    <IconWrapper name="shield-check" className="w-10 h-10 text-green-600 mb-8" />
                                    <h3 className="text-2xl font-bold mb-4">Operations & Compliance</h3>
                                    <p className="text-slate-600 mb-8 text-sm leading-relaxed">Compliance isn't a blocker; it's a requirement for trust. I specialize in regulatory documentation and operational process improvement.</p>
                                    <ul className="space-y-3 font-semibold text-slate-800 text-sm">
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-green-500 mr-3" /> Regulatory Compliance: HIPAA, FDA, 503B, FCC Telecom</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-green-500 mr-3" /> Process Mapping</li>
                                        <li className="flex items-center"><IconWrapper name="check-circle" className="w-4 h-4 text-green-500 mr-3" /> Risk Management</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Projects */}
                    <section id="projects" className="py-24 px-6 md:px-12 lg:px-24 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row md:items-end justify-between mb-16">
                                <div className="max-w-2xl">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tight">Selected Case Studies</h2>
                                    <div className="w-20 h-1.5 bg-blue-600 mt-2 mb-6"></div>
                                    <p className="text-slate-600 font-medium">A collection of work demonstrating end-to-end ownership—from initial scope to technical execution and documentation.</p>
                                </div>
                                <div className="flex flex-wrap gap-2 mt-8 md:mt-0">
                                    {['all', 'technical', 'ux', 'compliance', 'systems'].map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} className={`px-5 py-2 rounded text-[10px] font-bold uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                            {tab}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-10">
                                {filteredProjects.map(project => (
                                    <div key={project.id} className="bg-white rounded-xl shadow-sm border border-slate-200 hover:shadow-md transition-all overflow-hidden flex flex-col h-full">
                                        <div className="p-8 flex-1">
                                            <div className="flex items-start justify-between mb-6">
                                                <div className="p-3 bg-slate-50 rounded-lg"><IconWrapper name={project.icon} /></div>
                                                <Badge>{project.role}</Badge>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-900 mb-3">{project.title}</h3>
                                            <p className="text-slate-600 mb-6 text-sm leading-relaxed">{project.description}</p>
                                            <div className="pt-4 border-t border-slate-100">
                                                <ul className="space-y-3">
                                                    {project.metrics.map((m, i) => (
                                                        <li key={i} className="flex items-start text-sm text-slate-700">
                                                            <IconWrapper name="check-circle" className="w-4 h-4 text-green-500 mr-2 mt-0.5 flex-shrink-0" />
                                                            {m}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                        <div className="px-8 pb-8 flex flex-wrap gap-2">
                                            {project.tags.map((t, i) => <span key={i} className="text-[10px] font-bold text-slate-400 uppercase tracking-tight">#{t}</span>)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Methodology */}
                    <section id="process" className="py-24 px-6 md:px-12 lg:px-24 bg-slate-900 text-white">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-20">
                            <div>
                                <h2 className="text-3xl font-black uppercase tracking-tight mb-4">My Methodology</h2>
                                <div className="w-20 h-1.5 bg-blue-500 mb-8"></div>
                                <p className="text-slate-400 mb-12 text-lg">Successful documentation and project management require a systemic approach to gathering information and ensuring compliance before a single line of copy is published.</p>
                                <div className="space-y-10">
                                    {[
                                        { n: "1", t: "Discovery & Audit", d: "Deep dive into legacy systems, compliance requirements, and engineering constraints." },
                                        { n: "2", t: "Async & Collaborative Drafting", d: "Utilizing async tools (Jira, Loom, Notion) to drive consensus across time zones." },
                                        { n: "3", t: "Virtual Implementation & Training", d: "Deploying content via CMS and leading live virtual training sessions." }
                                    ].map(item => (
                                        <div key={item.n} className="flex">
                                            <div className="flex-shrink-0 h-12 w-12 rounded bg-blue-600 text-white flex items-center justify-center font-black text-xl">{item.n}</div>
                                            <div className="ml-6">
                                                <h4 className="text-xl font-bold mb-1">{item.t}</h4>
                                                <p className="text-slate-400 text-sm">{item.d}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-slate-800 p-10 rounded-2xl border border-slate-700">
                                <h3 className="text-xl font-black uppercase tracking-tight mb-10 flex items-center">
                                    <IconWrapper name="code" className="mr-3 text-blue-400" /> Technical Proficiency
                                </h3>
                                <SkillBar skill="Technical Writing (Markdown/DITA)" level={95} />
                                <SkillBar skill="Remote Collaboration (Slack/Zoom/Loom)" level={98} />
                                <SkillBar skill="Virtual Training Facilitation" level={90} />
                                <SkillBar skill="Project Management (Jira/Asana)" level={90} />
                                <SkillBar skill="UX Copywriting" level={85} />
                                <SkillBar skill="Compliance Frameworks" level={85} />
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 px-6 bg-white border-t border-slate-200 text-center">
                        <h2 className="text-4xl font-black text-slate-900 mb-8 uppercase tracking-tight">Ready to streamline your documentation?</h2>
                        <div className="flex flex-wrap justify-center gap-6 mb-16">
                            <a href={personalInfo.socials.email} className="px-8 py-4 bg-blue-600 text-white font-bold uppercase tracking-widest rounded shadow-lg hover:bg-blue-700 flex items-center">
                                <IconWrapper name="mail" className="w-5 h-5 mr-3" /> Email Me
                            </a>
                            <a href={personalInfo.socials.linkedin} target="_blank" className="px-8 py-4 bg-slate-900 text-white font-bold uppercase tracking-widest rounded hover:bg-slate-800 flex items-center">
                                <IconWrapper name="linkedin" className="w-5 h-5 mr-3" /> LinkedIn
                            </a>
                            <a href={personalInfo.socials.medium} target="_blank" className="px-8 py-4 bg-slate-100 text-slate-700 font-bold uppercase tracking-widest rounded hover:bg-slate-200 flex items-center">
                                <IconWrapper name="book-open" className="w-5 h-5 mr-3" /> Medium
                            </a>
                        </div>
                        <div className="pt-12 border-t border-slate-100 flex flex-col items-center">
                            <div className="w-10 h-10 bg-slate-200 rounded flex items-center justify-center text-slate-500 font-black mb-4 text-xs">A</div>
                            <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">&copy; 2026 {personalInfo.name}. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
